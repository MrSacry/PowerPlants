<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>U.S. Power Plants – Interactive Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet 1.9.4 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --surface: rgba(22, 27, 34, 0.96);
      --border: rgba(255,255,255,0.12);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --shadow: 0 8px 24px rgba(0,0,0,0.5);
      --radius: 12px;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      font-family: Lato, sans-serif;
      color: var(--text);
      height: 100%;
      overflow: hidden;
    }

    /* Full-screen map */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Floating UI layer */
    #ui-layer {
      position: fixed;
      inset: 0;
      z-index: 400;
      pointer-events: none;
    }

    /* Header bar */
    #header {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      text-align: center;
      pointer-events: auto;
      box-shadow: var(--shadow);
      max-width: calc(100vw - 560px);
      white-space: nowrap;
    }

    #header h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
    }

    #header h2 {
      margin: 2px 0 0;
      font-size: 0.76rem;
      font-weight: 400;
      color: var(--muted);
    }

    /* Search bar */
    #search-wrap {
      position: absolute;
      top: 12px;
      left: 12px;
      pointer-events: auto;
      width: 250px;
    }

    #search-input {
      width: 100%;
      padding: 9px 36px 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }

    #search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      display: none;
      padding: 0;
    }

    #search-results-count {
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--muted);
      padding-left: 4px;
    }

    /* Panel base */
    .panel {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      pointer-events: auto;
      min-width: 220px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
    }

    .panel-header:active { cursor: grabbing; }

    .panel-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }

    .panel-toggle {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0 2px;
      line-height: 1;
    }

    .panel-body {
      padding: 10px 14px 12px;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease;
    }

    .panel-body.collapsed {
      max-height: 0 !important;
      padding-top: 0;
      padding-bottom: 0;
    }

    /* Info panel */
    #info-panel {
      top: 110px;
      left: 12px;
      max-width: 250px;
    }

    #info-content {
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--muted);
    }

    #info-content .plant-name {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    #info-content .info-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #info-content .info-row:last-child { border-bottom: none; }
    #info-content .info-label { color: var(--muted); }
    #info-content .info-value { font-weight: 700; color: var(--text); text-align: right; }

    /* Stats panel */
    #stats-panel {
      top: 12px;
      right: 12px;
      max-width: 265px;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 4px 0;
      font-size: 0.81rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: opacity 0.2s;
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .stat-name { flex: 1; color: var(--text); }
    .stat-count { color: var(--muted); font-size: 0.74rem; min-width: 26px; text-align: right; }
    .stat-mw { font-weight: 700; min-width: 70px; text-align: right; }

    .stat-total {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 0.81rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }

    .stat-total strong { color: var(--accent); }

    /* Legend */
    .map-legend {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      color: var(--text);
      font-size: 0.81rem;
      max-height: 42vh;
      overflow-y: auto;
    }

    .legend-title {
      font-weight: 700;
      font-size: 0.79rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .legend-row.inactive { opacity: 0.35; }

    .legend-swatch {
      width: 11px; height: 11px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .legend-note {
      margin-top: 9px;
      padding-top: 7px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.4;
    }

    /* Capacity filter panel */
    #filter-panel {
      bottom: 60px;
      left: 12px;
      max-width: 250px;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.81rem;
    }

    .range-label-val {
      font-weight: 700;
      color: var(--accent);
      min-width: 48px;
      text-align: right;
      font-size: 0.79rem;
    }

    input[type=range] { flex: 1; accent-color: var(--accent); }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.71rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Leaflet overrides */
    .leaflet-control-layers {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      color: var(--text) !important;
    }

    .leaflet-control-layers label { color: var(--text) !important; font-size: 0.82rem; }
    .leaflet-control-layers-separator { border-color: var(--border) !important; }

    .leaflet-popup-content-wrapper {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .leaflet-popup-tip { background: var(--surface); }

    .leaflet-popup-content {
      margin: 12px 16px;
      font-size: 0.87rem;
      line-height: 1.5;
    }

    .popup-title {
      font-weight: 700;
      font-size: 0.93rem;
      margin-bottom: 6px;
    }

    .popup-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
    }

    .popup-swatch {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    /* Responsive */
    @media (max-width: 700px) {
      #header { display: none; }
      #search-wrap { width: calc(100vw - 24px); }
      #stats-panel {
        max-width: calc(100vw - 24px);
        right: 12px; top: auto;
        bottom: 110px;
        max-height: 220px;
      }
      #info-panel { max-width: calc(100vw - 24px); }
      #filter-panel { max-width: calc(100vw - 24px); }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="ui-layer">
    <!-- Search -->
    <div id="search-wrap">
      <input type="search" id="search-input"
             placeholder="Search plants by name..."
             autocomplete="off" aria-label="Search power plants" />
      <button id="search-clear" aria-label="Clear search">x</button>
      <div id="search-results-count" role="status" aria-live="polite"></div>
    </div>

    <!-- Title -->
    <div id="header">
      <h1>U.S. Power Plants &ndash; Interactive Map</h1>
      <h2>6,900 plants &middot; circle size = MW capacity &middot; click for details</h2>
    </div>

    <!-- Info panel -->
    <div class="panel" id="info-panel" role="region" aria-label="Plant details">
      <div class="panel-header" id="info-drag-handle">
        <span class="panel-title">Plant Details</span>
        <button class="panel-toggle" id="info-toggle" title="Toggle panel" aria-expanded="true">&#9650;</button>
      </div>
      <div class="panel-body" id="info-body" style="max-height:280px">
        <div id="info-content">
          <span style="color:var(--muted);font-size:0.82rem">Click any circle to see details</span>
        </div>
      </div>
    </div>

    <!-- Stats panel -->
    <div class="panel" id="stats-panel" role="region" aria-label="Statistics">
      <div class="panel-header" id="stats-drag-handle">
        <span class="panel-title">Statistics</span>
        <button class="panel-toggle" id="stats-toggle" title="Toggle panel" aria-expanded="true">&#9650;</button>
      </div>
      <div class="panel-body" id="stats-body" style="max-height:480px">
        <div id="stats-content"></div>
      </div>
    </div>

    <!-- Capacity filter -->
    <div class="panel" id="filter-panel" role="region" aria-label="Capacity filter">
      <div class="panel-header" id="filter-drag-handle">
        <span class="panel-title">Capacity Filter (MW)</span>
        <button class="panel-toggle" id="filter-toggle" title="Toggle panel" aria-expanded="true">&#9650;</button>
      </div>
      <div class="panel-body" id="filter-body" style="max-height:120px">
        <div class="range-row">
          <span style="color:var(--muted)">Min</span>
          <input type="range" id="cap-min" min="0" max="6000" value="0" step="10"
                 aria-label="Minimum capacity in MW" />
          <span class="range-label-val" id="cap-min-label">0</span>
        </div>
        <div class="range-row" style="margin-top:6px">
          <span style="color:var(--muted)">Max</span>
          <input type="range" id="cap-max" min="0" max="6000" value="6000" step="10"
                 aria-label="Maximum capacity in MW" />
          <span class="range-label-val" id="cap-max-label">6000+</span>
        </div>
        <div class="range-labels"><span>0 MW</span><span>6,000+ MW</span></div>
      </div>
    </div>
  </div>

  <!-- Data (declares `var plants`) -->
  <script src="PowerPlants.js"></script>

  <script>
    // ─────────────────────────────────────────────
    // FUEL TYPE CONFIGURATION
    // ─────────────────────────────────────────────
    var FUEL_CONFIG = {
      'Solar':               { fill: '#ffd700', stroke: '#e6a800', text: '#000', on: true  },
      'Wind':                { fill: '#00e5ff', stroke: '#0097a7', text: '#000', on: true  },
      'Hydro':               { fill: '#2979ff', stroke: '#0d47a1', text: '#fff', on: true  },
      'Biomass':             { fill: '#69f0ae', stroke: '#00695c', text: '#000', on: true  },
      'Geothermal':          { fill: '#ea80fc', stroke: '#7b1fa2', text: '#000', on: true  },
      'Wood':                { fill: '#a5d6a7', stroke: '#2e7d32', text: '#000', on: false },
      'Nuclear':             { fill: '#ff5252', stroke: '#b71c1c', text: '#fff', on: false },
      'Pumped Storage':      { fill: '#40c4ff', stroke: '#0277bd', text: '#000', on: false },
      'Natural Gas':         { fill: '#ffab40', stroke: '#e65100', text: '#000', on: false },
      'Coal':                { fill: '#90a4ae', stroke: '#37474f', text: '#000', on: false },
      'Petroleum':           { fill: '#bcaaa4', stroke: '#4e342e', text: '#000', on: false },
      'Other':               { fill: '#b0bec5', stroke: '#546e7a', text: '#000', on: false },
      'Other Fossil Gasses': { fill: '#cfd8dc', stroke: '#455a64', text: '#000', on: false }
    };

    var FUEL_KEYS = Object.keys(FUEL_CONFIG);

    // Constants
    var MAX_CAPACITY_MW   = 6000;
    var SEARCH_DEBOUNCE_MS = 300;
    var CAP_DEBOUNCE_MS    = 250;

    // ─────────────────────────────────────────────
    // MAP INIT
    // ─────────────────────────────────────────────
    var map = L.map('map', { center: [38, -96], zoom: 4 });
    map.zoomControl.setPosition('bottomright');

    var darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(map);

    var lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    });

    L.control.layers({ 'Dark Theme': darkTiles, 'Light Theme': lightTiles }, {},
      { position: 'bottomleft', collapsed: true }).addTo(map);

    // ─────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────
    function getRadius(mw) {
      return Math.max(3, Math.min(Math.sqrt(mw / Math.PI) * 3.5, 40));
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatMw(mw) {
      if (mw >= 1000000) return (mw / 1000000).toFixed(2) + ' TW';
      if (mw >= 1000)    return (mw / 1000).toFixed(1) + ' GW';
      return mw.toLocaleString() + ' MW';
    }

    // ─────────────────────────────────────────────
    // PRE-PROCESS: build per-fuel marker arrays + global stats
    // ─────────────────────────────────────────────
    var markersByFuel = {};
    var globalStats   = {};

    FUEL_KEYS.forEach(function(ft) {
      markersByFuel[ft] = [];
      globalStats[ft]   = { count: 0, totalMw: 0 };
    });

    plants.features.forEach(function(feature) {
      var props  = feature.properties;
      var coords = feature.geometry.coordinates;
      var latlng = [coords[1], coords[0]];
      var name   = props.plant_name;
      var state  = props.state || '';

      Object.keys(props.fuel_source).forEach(function(ft) {
        var mw = props.fuel_source[ft];
        if (!FUEL_CONFIG[ft]) return;

        var cfg = FUEL_CONFIG[ft];
        globalStats[ft].count++;
        globalStats[ft].totalMw += mw;

        var marker = L.circleMarker(latlng, {
          radius: getRadius(mw),
          color: cfg.stroke,
          weight: 1,
          fillColor: cfg.fill,
          fillOpacity: 0.78
        });

        marker._plantName = name;
        marker._fuelType  = ft;
        marker._mw        = mw;
        marker._state     = state;

        marker.on('mouseover', function() {
          this.setStyle({ fillOpacity: 0.97, weight: 2.5 });
          this.bringToFront();
        });
        marker.on('mouseout', function() {
          this.setStyle({ fillOpacity: 0.78, weight: 1 });
        });
        marker.on('click', function() {
          showInfoPanel(this);
        });

        marker.bindTooltip(
          escHtml(name) + ' &bull; ' + escHtml(ft) + ' &bull; ' + mw.toLocaleString() + ' MW',
          { sticky: true, opacity: 0.92 }
        );

        marker.bindPopup(buildPopup(name, ft, mw, state, cfg.fill), { maxWidth: 260 });

        markersByFuel[ft].push({ marker: marker, nameLower: name.toLowerCase(), mw: mw });
      });
    });

    function buildPopup(name, ft, mw, state, fillColor) {
      return '<div class="popup-title">' + escHtml(name) + '</div>' +
        '<div class="popup-row">' +
          '<span class="popup-swatch" style="background:' + fillColor + '"></span>' +
          '<b>' + escHtml(ft) + '</b>' +
        '</div>' +
        (state ? '<div class="popup-row"><span style="color:var(--muted)">State&nbsp;</span>' + escHtml(state) + '</div>' : '') +
        '<div class="popup-row"><span style="color:var(--muted)">Capacity&nbsp;</span><b>' + mw.toLocaleString() + ' MW</b></div>';
    }

    // ─────────────────────────────────────────────
    // CLUSTER GROUPS (created fresh on each render)
    // ─────────────────────────────────────────────
    var activeClusterGroups = {};

    function makeClusterGroup(ft) {
      var cfg = FUEL_CONFIG[ft];
      return L.markerClusterGroup({
        maxClusterRadius: 45,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
        zoomToBoundsOnClick: true,
        iconCreateFunction: function(cluster) {
          var n = cluster.getChildCount();
          var s = n < 10 ? 32 : n < 100 ? 42 : 52;
          var fs = s > 38 ? 13 : 11;
          return L.divIcon({
            html: '<div style="width:' + s + 'px;height:' + s + 'px;border-radius:50%;' +
              'background:' + cfg.fill + ';border:2px solid ' + cfg.stroke + ';' +
              'display:flex;align-items:center;justify-content:center;' +
              'font-weight:700;font-size:' + fs + 'px;color:' + cfg.text + '">' + n + '</div>',
            className: '',
            iconSize: L.point(s, s)
          });
        }
      });
    }

    // ─────────────────────────────────────────────
    // FILTER STATE
    // ─────────────────────────────────────────────
    var searchTerm = '';
    var capMin = 0;
    var capMax = MAX_CAPACITY_MW;
    var totalVisibleCount = 0;

    // ─────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────
    function renderLayers() {
      // Remove old cluster groups
      Object.keys(activeClusterGroups).forEach(function(ft) {
        if (map.hasLayer(activeClusterGroups[ft])) {
          map.removeLayer(activeClusterGroups[ft]);
        }
      });
      activeClusterGroups = {};
      totalVisibleCount = 0;

      FUEL_KEYS.forEach(function(ft) {
        if (!FUEL_CONFIG[ft].on) return;

        var cg = makeClusterGroup(ft);
        var items = markersByFuel[ft];

        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var nameMatch = !searchTerm || item.nameLower.indexOf(searchTerm) !== -1;
          var capMatch  = item.mw >= capMin && (capMax >= MAX_CAPACITY_MW || item.mw <= capMax);
          if (nameMatch && capMatch) {
            cg.addLayer(item.marker);
            totalVisibleCount++;
          }
        }

        if (cg.getLayers().length > 0) {
          cg.addTo(map);
        }
        activeClusterGroups[ft] = cg;
      });

      updateSearchCount();
      renderStats();
    }

    // ─────────────────────────────────────────────
    // STATS PANEL
    // ─────────────────────────────────────────────
    function renderStats() {
      var el = document.getElementById('stats-content');
      var html = '';
      var grandCount = 0, grandMw = 0;

      FUEL_KEYS.forEach(function(ft) {
        var gs = globalStats[ft];
        if (!gs || gs.count === 0) return;

        var vCount = 0, vMw = 0;
        var items = markersByFuel[ft];
        for (var i = 0; i < items.length; i++) {
          var nameMatch = !searchTerm || items[i].nameLower.indexOf(searchTerm) !== -1;
          var capMatch  = items[i].mw >= capMin && (capMax >= MAX_CAPACITY_MW || items[i].mw <= capMax);
          if (nameMatch && capMatch) { vCount++; vMw += items[i].mw; }
        }

        grandCount += vCount;
        grandMw    += vMw;

        var cfg = FUEL_CONFIG[ft];
        var dim = !cfg.on ? ' style="opacity:0.32"' : '';

        html +=
          '<div class="stat-row"' + dim + '>' +
            '<span class="stat-swatch" style="background:' + cfg.fill + ';border:1.5px solid ' + cfg.stroke + '"></span>' +
            '<span class="stat-name">' + escHtml(ft) + '</span>' +
            '<span class="stat-count">' + vCount + '</span>' +
            '<span class="stat-mw" style="color:' + cfg.fill + '">' + formatMw(vMw) + '</span>' +
          '</div>';
      });

      html +=
        '<div class="stat-total">' +
          '<span>Visible</span>' +
          '<strong>' + grandCount + ' plants &middot; ' + formatMw(grandMw) + '</strong>' +
        '</div>';

      el.innerHTML = html;
    }

    // ─────────────────────────────────────────────
    // INFO PANEL
    // ─────────────────────────────────────────────
    function showInfoPanel(marker) {
      var name = marker._plantName;
      var ft   = marker._fuelType;
      var mw   = marker._mw;
      var st   = marker._state;
      var cfg  = FUEL_CONFIG[ft];
      var gs   = globalStats[ft];
      var pct  = gs.totalMw > 0 ? ((mw / gs.totalMw) * 100).toFixed(2) : '0.00';

      var html =
        '<div class="plant-name">' + escHtml(name) + '</div>' +
        '<div class="info-row">' +
          '<span class="info-label">Fuel type</span>' +
          '<span class="info-value" style="color:' + cfg.fill + '">' + escHtml(ft) + '</span>' +
        '</div>';

      if (st) {
        html +=
          '<div class="info-row">' +
            '<span class="info-label">State</span>' +
            '<span class="info-value">' + escHtml(st) + '</span>' +
          '</div>';
      }

      html +=
        '<div class="info-row">' +
          '<span class="info-label">Capacity</span>' +
          '<span class="info-value">' + mw.toLocaleString() + ' MW</span>' +
        '</div>' +
        '<div class="info-row">' +
          '<span class="info-label">% of ' + escHtml(ft) + '</span>' +
          '<span class="info-value">' + pct + '%</span>' +
        '</div>';

      document.getElementById('info-content').innerHTML = html;

      // Expand if collapsed
      var body = document.getElementById('info-body');
      if (body.classList.contains('collapsed')) {
        body.classList.remove('collapsed');
        document.getElementById('info-toggle').textContent = '\u25B2';
        document.getElementById('info-toggle').setAttribute('aria-expanded', 'true');
      }
    }

    // ─────────────────────────────────────────────
    // SEARCH
    // ─────────────────────────────────────────────
    var searchDebounce;
    var searchInput = document.getElementById('search-input');
    var searchClear = document.getElementById('search-clear');

    searchInput.addEventListener('input', function() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(function() {
        searchTerm = searchInput.value.trim().toLowerCase();
        searchClear.style.display = searchTerm ? 'block' : 'none';
        renderLayers();
      }, SEARCH_DEBOUNCE_MS);
    });

    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      searchTerm = '';
      searchClear.style.display = 'none';
      document.getElementById('search-results-count').textContent = '';
      renderLayers();
    });

    function updateSearchCount() {
      var el = document.getElementById('search-results-count');
      if (!searchTerm) { el.textContent = ''; return; }
      el.textContent = totalVisibleCount + ' plant' + (totalVisibleCount !== 1 ? 's' : '') + ' found';
    }

    // ─────────────────────────────────────────────
    // CAPACITY SLIDERS
    // ─────────────────────────────────────────────
    var capMinSlider = document.getElementById('cap-min');
    var capMaxSlider = document.getElementById('cap-max');
    var capMinLabel  = document.getElementById('cap-min-label');
    var capMaxLabel  = document.getElementById('cap-max-label');

    function updateCapLabels() {
      capMinLabel.textContent = capMin;
      capMaxLabel.textContent = capMax >= MAX_CAPACITY_MW ? MAX_CAPACITY_MW + '+' : capMax;
    }

    var capDebounce;
    function onCapInput(e) {
      capMin = parseInt(capMinSlider.value, 10);
      capMax = parseInt(capMaxSlider.value, 10);
      if (capMin > capMax) {
        if (e.target === capMinSlider) { capMax = capMin; capMaxSlider.value = capMax; }
        else { capMin = capMax; capMinSlider.value = capMin; }
      }
      updateCapLabels();
      clearTimeout(capDebounce);
      capDebounce = setTimeout(renderLayers, CAP_DEBOUNCE_MS);
    }

    capMinSlider.addEventListener('input', onCapInput);
    capMaxSlider.addEventListener('input', onCapInput);

    // ─────────────────────────────────────────────
    // LEGEND (Leaflet control)
    // ─────────────────────────────────────────────
    var legendControl = L.control({ position: 'bottomright' });

    legendControl.onAdd = function() {
      var div = L.DomUtil.create('div', 'map-legend');
      L.DomEvent.disableScrollPropagation(div);
      L.DomEvent.disableClickPropagation(div);

      var html = '<div class="legend-title">Fuel Types (click to toggle)</div>';
      FUEL_KEYS.forEach(function(ft) {
        var cfg = FUEL_CONFIG[ft];
        var cls = cfg.on ? 'legend-row' : 'legend-row inactive';
        html +=
          '<div class="' + cls + '" data-ft="' + escHtml(ft) + '" title="Toggle ' + escHtml(ft) + '" role="button" tabindex="0" aria-pressed="' + cfg.on + '">' +
            '<span class="legend-swatch" style="background:' + cfg.fill + ';border:1.5px solid ' + cfg.stroke + '"></span>' +
            '<span>' + escHtml(ft) + '</span>' +
          '</div>';
      });
      html += '<div class="legend-note">Circle size &prop; MW capacity</div>';
      div.innerHTML = html;

      div.querySelectorAll('.legend-row').forEach(function(row) {
        function toggle() {
          var ft = row.dataset.ft;
          FUEL_CONFIG[ft].on = !FUEL_CONFIG[ft].on;
          row.classList.toggle('inactive', !FUEL_CONFIG[ft].on);
          row.setAttribute('aria-pressed', FUEL_CONFIG[ft].on);
          renderLayers();
        }
        row.addEventListener('click', toggle);
        row.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
        });
      });

      return div;
    };

    legendControl.addTo(map);

    // ─────────────────────────────────────────────
    // PANEL: COLLAPSE + DRAG
    // ─────────────────────────────────────────────
    function initCollapse(toggleId, bodyId) {
      var btn  = document.getElementById(toggleId);
      var body = document.getElementById(bodyId);
      btn.addEventListener('click', function() {
        var isCollapsed = body.classList.toggle('collapsed');
        btn.innerHTML   = isCollapsed ? '&#9660;' : '&#9650;';
        btn.setAttribute('aria-expanded', !isCollapsed);
      });
    }

    function makeDraggable(panelId, handleId) {
      var panel  = document.getElementById(panelId);
      var handle = document.getElementById(handleId);
      var startX, startY, origLeft, origTop;

      handle.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        e.preventDefault();
        var rect = panel.getBoundingClientRect();
        startX = e.clientX; startY = e.clientY;
        origLeft = rect.left; origTop = rect.top;
        panel.style.left   = origLeft + 'px';
        panel.style.top    = origTop + 'px';
        panel.style.right  = 'auto';
        panel.style.bottom = 'auto';

        function onMove(ev) {
          panel.style.left = Math.max(0, origLeft + ev.clientX - startX) + 'px';
          panel.style.top  = Math.max(0, origTop  + ev.clientY - startY) + 'px';
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    initCollapse('info-toggle',    'info-body');
    initCollapse('stats-toggle',   'stats-body');
    initCollapse('filter-toggle',  'filter-body');

    makeDraggable('info-panel',   'info-drag-handle');
    makeDraggable('stats-panel',  'stats-drag-handle');
    makeDraggable('filter-panel', 'filter-drag-handle');

    // ─────────────────────────────────────────────
    // BOOT
    // ─────────────────────────────────────────────
    updateCapLabels();
    renderLayers();
  </script>
</body>
</html>
